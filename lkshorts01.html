<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: Russisch</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --accent-green: #4caf50;
            --dark-green: #1b5e20;
            --card-shadow: rgba(0, 0, 0, 0.2);
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
        }

        .progress {
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary-green);
        }

        /* Card 3D Flip Styles */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px var(--card-shadow);
            border-radius: 15px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background: white;
            border: 2px solid var(--accent-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f1f8e9;
        }

        .vokabel-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--dark-green);
            word-wrap: break-word;
            max-width: 100%;
        }

        .note {
            font-size: 1rem;
            color: #666;
            margin-top: 15px;
            font-style: italic;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .nav-buttons, .action-buttons {
            display: contents;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--primary-green);
            color: white;
            transition: background 0.3s, transform 0.1s;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--accent-green);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background-color: var(--neutral-color, #546e7a);
            grid-column: span 1;
        }

        .full-width {
            grid-column: span 2;
            margin-top: 10px;
            background-color: #388e3c;
        }

        @media (max-width: 480px) {
            .card-container { height: 250px; }
            .vokabel-text { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch-Lernkartei</h1>
    <div class="progress" id="progress">1 / 40</div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="vokabel-text" id="front-text">Laden...</div>
            </div>
            <div class="card-face card-back">
                <div class="vokabel-text" id="back-text">Laden...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">← Vorherige</button>
        <button onclick="nextCard()">Nächste →</button>
        <button class="btn-secondary" onclick="shuffleCards()">Mischen 🔀</button>
        <button class="btn-secondary" onclick="goFirst()">An den Anfang 🏠</button>
    </div>
</div>

<script>
    // Vokabeldaten
    const vocabulary = [
        {front: "ничегό", back: "nichts / ganz gut (umgangssprachlich)"},
        {front: "ничё", back: "nichts / ganz gut (umgangssprachlich, Kurzform)"},
        {front: "ничегό так", back: "nicht schlecht / ganz ordentlich"},
        {front: "ничё так", back: "nicht schlecht / ganz ordentlich (Kurzform)"},
        {front: "неплόхо", back: "nicht schlecht"},
        {front: "όчень дáже ничегό", back: "sogar sehr ordentlich / wirklich nicht schlecht"},
        {front: "ничегό такόй", back: "ganz hübsch / attraktiv / sympathisch (männlich)"},
        {front: "ничегό такáя", back: "ganz hübsch / attraktiv / sympathisch (weiblich)"},
        {front: "ничегό получѝлось", back: "es ist ganz gut geworden"},
        {front: "получáться / получѝться", back: "gelingen / werden / klappen"},
        {front: "дéвушка", back: "Mädchen / junge Frau"},
        {front: "пáрень", back: "Junge / junger Mann / Freund"},
        {front: "брáт", back: "Bruder"},
        {front: "сестрá", back: "Schwester"},
        {front: "друг", back: "Freund"},
        {front: "подрýга", back: "Freundin"},
        {front: "актёр", back: "Schauspieler"},
        {front: "карти́на", back: "Bild / Gemälde"},
        {front: "рисовáть / нарисовáть", back: "malen / zeichnen"},
        {front: "дизáйн", back: "Design"},
        {front: "фильм", back: "Film"},
        {front: "смотрéть / посмотрéть", back: "schauen / ansehen"},
        {front: "ви́деть / уви́деть", back: "sehen"},
        {front: "нрáвиться / понрáвиться", back: "gefallen"},
        {front: "показáться / показáться", back: "scheinen / erscheinen"},
        {front: "выступáть / вы́ступить", back: "auftreten / eine Leistung erbringen"},
        {front: "выступлéние", back: "Auftritt / Darbietung"},
        {front: "молóдчина", back: "Prachtkerl / klasse gemacht (geschlechtsneutral)"},
        {front: "молодéц", back: "gut gemacht / bravo"},
        {front: "прáвда", back: "Wahrheit / wirklich?"},
        {front: "говóрят", back: "man sagt / man erzählt sich"},
        {front: "говóрить / сказáть", back: "sprechen / sagen"},
        {front: "дéлать / сдéлать", back: "machen / tun"},
        {front: "готόвить / приготόвить", back: "zubereiten / kochen"},
        {front: "сýши", back: "Sushi"},
        {front: "платóк", back: "Tuch / Schal"},
        {front: "плáтье", back: "Kleid"},
        {front: "сидéть / посидéть", back: "sitzen / (Kleidung:) passen / stehen"},
        {front: "серди́ться / рассерди́ться", back: "böse sein / wütend werden"},
        {front: "совéтовать / посовéтовать", back: "raten / empfehlen"}
    ];

    let deck = [...vocabulary];
    let currentIndex = 0;

    const card = document.getElementById('card');
    const frontText = document.getElementById('front-text');
    const backText = document.getElementById('back-text');
    const progress = document.getElementById('progress');

    function updateCard() {
        // Reset flip state
        card.classList.remove('is-flipped');
        
        // Timeout for transition effect
        setTimeout(() => {
            const currentVokabel = deck[currentIndex];
            frontText.innerText = currentVokabel.front;
            backText.innerText = currentVokabel.back;
            
            // Dynamische Schriftgröße
            adjustFontSize(frontText);
            adjustFontSize(backText);

            progress.innerText = `${currentIndex + 1} / ${deck.length}`;
        }, 150);
    }

    function adjustFontSize(element) {
        const length = element.innerText.length;
        if (length > 40) {
            element.style.fontSize = "1.2rem";
        } else if (length > 20) {
            element.style.fontSize = "1.5rem";
        } else {
            element.style.fontSize = "2.2rem";
        }
    }

    function flipCard() {
        card.classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < deck.length - 1) {
            currentIndex++;
            updateCard();
        } else {
            // Optional: Loop
            currentIndex = 0;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goFirst() {
        currentIndex = 0;
        updateCard();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            flipCard();
        } else if (e.code === 'ArrowRight') {
            nextCard();
        } else if (e.code === 'ArrowLeft') {
            prevCard();
        } else if (e.code === 'Home') {
            goFirst();
        }
    });

    // Initialisierung
    updateCard();
</script>

</body>
</html>
